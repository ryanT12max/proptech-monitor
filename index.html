<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropTech Threat Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .threat-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .high-threat { border-left: 5px solid red; }
        .low-threat { border-left: 5px solid green; }
    </style>
</head>
<body>
    <h2>Live Real Estate Threat Monitor</h2>
    <div id="dashboard">Loading threat intelligence...</div>

    <script>
        // Replace with your generated ORDS URL
        const ordsUrl = 'https://g9f6559706c9bbf-aviationdb.adb.us-chicago-1.oraclecloudapps.com/ords/admin/proptech_threats/';

        fetch(ordsUrl)
            .then(response => response.json())
            .then(data => {
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = ''; 
                
                data.items.forEach(item => {
                    const threatClass = item.threat_level.includes('High') ? 'high-threat' : 'low-threat';
                    const card = `
                        <div class="threat-card ${threatClass}">
                            <h3>${item.property_address} - $${item.list_price}</h3>
                            <p><strong>Risk Level:</strong> ${item.threat_level}</p>
                            <p><strong>AI Analysis:</strong> ${item.ai_reasoning}</p>
                            <small>Logged: ${new Date(item.timestamp).toLocaleString()}</small>
                        </div>
                    `;
                    dashboard.innerHTML += card;
                });
            })
            .catch(error => {
                document.getElementById('dashboard').innerText = 'Error loading intelligence feed.';
            });
    </script>
</body>
</html>
