<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropTech Threat Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .threat-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .high-threat { border-left: 5px solid red; }
        .low-threat { border-left: 5px solid green; }
    </style>
</head>
<body>
    <h2>Live Real Estate Threat Monitor</h2>
    <div id="dashboard">Loading threat intelligence...</div>

    <script>
        // REPLACE THE URL BELOW WITH YOUR ACTUAL ORDS ENDPOINT
        const ordsUrl = 'https://g9f6559706c9bbf-aviationdb.abd.us-chicago-1.oraclecloudapps.com/ords/admin/api/threats';

        fetch(ordsUrl)
            .then(response => response.json())
            .then(data => {
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = ''; 
                
                // Check if the database is empty
                if (!data.items || data.items.length === 0) {
                    dashboard.innerHTML = '<p>No threats detected yet. Run your OCI Pipeline to fetch data.</p>';
                    return;
                }

                // Map through the database columns
                data.items.forEach(item => {
                    const threatClass = item.threat_score > 5 ? 'high-threat' : 'low-threat';
                    const card = `
                        <div class="threat-card ${threatClass}">
                            <h3>${item.property_address} - $${item.list_price}</h3>
                            <p><strong>Risk Classification:</strong> ${item.risk_classification} (Score: ${item.threat_score}/10)</p>
                            <p><strong>AI Analysis:</strong> ${item.ai_analysis}</p>
                            <small>Logged: ${new Date(item.log_time).toLocaleString()}</small>
                        </div>
                    `;
                    dashboard.innerHTML += card;
                });
            })
            .catch(error => {
                console.error("Fetch error:", error);
                document.getElementById('dashboard').innerHTML = '<p style="color:red;">Error loading intelligence feed. Have you enabled CORS in Oracle?</p>';
            });
    </script>
</body>
</html>
