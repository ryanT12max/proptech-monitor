<script>
        
        const ordsUrl = 'https://g9f6559706c9bbf-aviationdb.adb.us-chicago-1.oraclecloudapps.com/ords/admin/proptech_threats/';

        fetch(ordsUrl)
            .then(response => response.json())
            .then(data => {
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = ''; 
                
                // Check if the database is empty
                if (!data.items || data.items.length === 0) {
                    dashboard.innerHTML = '<p>No threats detected yet. Awaiting OCI Pipeline execution.</p>';
                    return;
                }

                // Map through the new database columns
                data.items.forEach(item => {
                    // Using the new numeric THREAT_SCORE (assuming a 1-10 scale, where > 5 is high risk)
                    const threatClass = item.threat_score > 5 ? 'high-threat' : 'low-threat';
                    const card = `
                        <div class="threat-card ${threatClass}">
                            <h3>${item.property_address} - $${item.list_price}</h3>
                            <p><strong>Risk Classification:</strong> ${item.risk_classification} (Score: ${item.threat_score}/10)</p>
                            <p><strong>AI Analysis:</strong> ${item.ai_analysis}</p>
                            <small>Logged: ${new Date(item.log_time).toLocaleString()}</small>
                        </div>
                    `;
                    dashboard.innerHTML += card;
                });
            })
            .catch(error => {
                console.error("Fetch error:", error);
                document.getElementById('dashboard').innerHTML = '<p style="color:red;">Error loading intelligence feed. Press F12 to check the console for details.</p>';
            });
    </script>
